name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      id-token: write
    env:
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Base RPC configuration
        id: base-rpc
        shell: bash
        run: |
          if [ -n "${BASE_RPC_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "BASE_RPC_URL is not configured; skipping Base slow profile."
          fi

      - name: Install Foundry
        if: steps.base-rpc.outputs.enabled == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Run Base slow profile
        if: steps.base-rpc.outputs.enabled == 'true'
        run: npm run test:integration:base:slow

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
