name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

  base-fork-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Base RPC configuration
        id: base-rpc
        shell: bash
        run: |
          if [ -n "${BASE_RPC_URL}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "BASE_RPC_URL is not configured; skipping Base smoke profile."
          fi

      - name: Install Foundry
        if: steps.base-rpc.outputs.enabled == 'true'
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Node
        if: steps.base-rpc.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        if: steps.base-rpc.outputs.enabled == 'true'
        run: npm ci

      - name: Run Base smoke profile
        if: steps.base-rpc.outputs.enabled == 'true'
        run: npm run test:integration:base:smoke

      - name: Run Base default profile
        if: steps.base-rpc.outputs.enabled == 'true'
        run: npm run test:integration:base
